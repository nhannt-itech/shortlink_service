# Omakase Ruby styling for Rails
inherit_gem: { rubocop-rails-omakase: rubocop.yml }

# Merge excludes with inherited config rather than replacing it.
inherit_mode:
  merge:
    - Exclude

# Project-level defaults tuned for Rails services.
AllCops:
  NewCops: enable
  TargetRubyVersion: 3.4
  SuggestExtensions: false
  Exclude:
    - "bin/**/*"
    - "db/schema.rb"
    - "log/**/*"
    - "tmp/**/*"
    - "vendor/**/*"

# Keep code readable while avoiding noisy violations.
Layout/LineLength:
  Max: 120

# Rails apps typically do not require top-level class/module docs.
Style/Documentation:
  Enabled: false
