<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShortLink Demo</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f6f8fb;
        color: #111827;
      }

      .container {
        max-width: 920px;
        margin: 40px auto;
        padding: 0 20px 40px;
      }

      .title {
        margin: 0;
        font-size: 32px;
      }

      .subtitle {
        margin-top: 8px;
        color: #4b5563;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 20px;
        margin-top: 24px;
      }

      .card {
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 8px 20px rgba(17, 24, 39, 0.04);
      }

      .card h2 {
        margin: 0 0 12px;
        font-size: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 600;
      }

      input {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 14px;
        margin-bottom: 12px;
      }

      button {
        border: none;
        border-radius: 8px;
        background: #2563eb;
        color: #ffffff;
        padding: 10px 14px;
        font-weight: 600;
        cursor: pointer;
      }

      button:hover {
        background: #1d4ed8;
      }

      .result {
        margin-top: 14px;
        background: #0b1020;
        color: #d1fae5;
        border-radius: 8px;
        padding: 12px;
        min-height: 80px;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 13px;
      }

      .links {
        margin-top: 20px;
        color: #4b5563;
        font-size: 14px;
      }

      .links a {
        color: #2563eb;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1 class="title">ShortLink Feature Demo</h1>
      <p class="subtitle">Use this page to demonstrate URL encoding and decoding.</p>

      <div class="grid">
        <section class="card">
          <h2>Encode URL</h2>
          <label for="encode-url">Original URL</label>
          <input id="encode-url" type="url" placeholder="https://codesubmit.io/library/react" />
          <button id="encode-btn" type="button">Encode</button>
          <div id="encode-result" class="result">{ "short_url": "..." }</div>
        </section>

        <section class="card">
          <h2>Decode Code</h2>
          <label for="decode-code">Short Code</label>
          <input id="decode-code" type="text" placeholder="00aB12" />
          <button id="decode-btn" type="button">Decode</button>
          <div id="decode-result" class="result">{ "url": "..." }</div>
        </section>
      </div>

      <p class="links">
        API docs: <a href="/api-docs" target="_blank" rel="noopener noreferrer">/api-docs</a>
      </p>
    </div>

    <script>
      async function postJson(path, payload) {
        const response = await fetch(path, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });

        let body;
        try {
          body = await response.json();
        } catch (_error) {
          body = { error: "Invalid JSON response" };
        }

        return { ok: response.ok, body };
      }

      function pretty(value) {
        return JSON.stringify(value, null, 2);
      }

      document.getElementById("encode-btn").addEventListener("click", async () => {
        const url = document.getElementById("encode-url").value.trim();
        const target = document.getElementById("encode-result");

        if (!url) {
          target.textContent = pretty({ errors: { url: ["Please input a URL"] } });
          return;
        }

        target.textContent = "Loading...";
        const result = await postJson("/encode", { url });
        target.textContent = pretty(result.body);

        if (result.ok && result.body.short_url) {
          const code = result.body.short_url.split("/").pop();
          document.getElementById("decode-code").value = code || "";
        }
      });

      document.getElementById("decode-btn").addEventListener("click", async () => {
        const code = document.getElementById("decode-code").value.trim();
        const target = document.getElementById("decode-result");

        if (!code) {
          target.textContent = pretty({ errors: { code: ["Please input a short code"] } });
          return;
        }

        target.textContent = "Loading...";
        const result = await postJson("/decode", { code });
        target.textContent = pretty(result.body);
      });
    </script>
  </body>
</html>
